# =============================================================================
# cd.yml - ORCHESTRATOR workflow
# =============================================================================
# The deployment repository's equivalent of the app repo's ci.yml: the only
# workflow that actually triggers, and its job is purely to call the reusable
# building blocks (terraform.yml, then deploy.yml) in order.
#
# Two ways this can start:
#   1. AUTOMATIC: the app repo's CI notifies this repo via repository_dispatch
#      the moment a new image is built from main - cloud_provider defaults to
#      "aws" in that case (or whatever your team's default target is).
#   2. MANUAL: a human explicitly runs this workflow via workflow_dispatch,
#      choosing exactly which cloud and which image tag to deploy - this is
#      the primary way you'll demo switching clouds for this PoC.

name: CD

on:
  push:
    branches: [main]

  repository_dispatch:
    types: [app-image-built]

  workflow_dispatch:
    inputs:
      cloud_provider:
        description: "Which cloud to deploy to"
        required: true
        default: "aws"
        type: choice
        options:
          - aws
          - azure
          - gcp
      image_tag:
        description: "Full image reference to deploy (leave default to use latest)"
        required: false
        default: "ghcr.io/ishnarai/cloud-agnostic-app:latest"
        type: string

jobs:
  determine-inputs:
    runs-on: ubuntu-latest
    outputs:
      cloud_provider: ${{ steps.resolve.outputs.cloud_provider }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - name: Resolve deployment inputs based on trigger type
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "cloud_provider=aws" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.event.client_payload.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "cloud_provider=${{ inputs.cloud_provider }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi
        # This step is the bridge between the two trigger types, normalizing
        # BOTH into the same two values (cloud_provider, image_tag) that the
        # rest of the pipeline consumes identically - downstream jobs never
        # need to know or care which trigger fired.

  terraform:
    needs: determine-inputs
    uses: ./.github/workflows/terraform.yml
    with:
      cloud_provider: ${{ needs.determine-inputs.outputs.cloud_provider }}
    secrets: inherit
    # `secrets: inherit` passes ALL of this repo's secrets down to the
    # reusable workflow automatically - appropriate here since terraform.yml
    # lives in the SAME repository (unlike the cross-repo DEPLOY_REPO_PAT
    # case in ci.yml, secrets: inherit only works within one repo's own
    # reusable workflows).

  deploy:
    needs: [determine-inputs, terraform]
    uses: ./.github/workflows/deploy.yml
    with:
      cloud_provider: ${{ needs.determine-inputs.outputs.cloud_provider }}
      image_tag: ${{ needs.determine-inputs.outputs.image_tag }}
    secrets: inherit
