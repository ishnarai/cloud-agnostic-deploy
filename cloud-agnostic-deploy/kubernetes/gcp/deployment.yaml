# =============================================================================
# deployment.yaml (GCP)
# =============================================================================
# Identical in structure to every other clouds deployment.yaml - this is
# the concrete proof of "the application layer stays cloud-agnostic." The
# ONLY cloud-specific file in this folder is ingress.yaml.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: orion-deployment
  labels:
    app: orion

spec:
  replicas: 2
  selector:
    matchLabels:
      app: orion
  template:
    metadata:
      labels:
        app: orion
    spec:
      containers:
        - name: orion-app
          # IMAGE IS SET BY THE CD PIPELINE (deploy.yml), not hardcoded here.
          # deploy.sh / deploy.yml runs:
          #   kubectl set image deployment/orion-deployment orion-app=<image_tag>
          # using the SHA-tagged image built by the cloud-agnostic-app repos CI.
          image: ghcr.io/ishnarai/cloud-agnostic-app:latest
          ports:
            - containerPort: 8000
          env:
            - name: CLOUD_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: orion-config
                  key: CLOUD_PROVIDER
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orion-config
data:
  CLOUD_PROVIDER: "gcp"
