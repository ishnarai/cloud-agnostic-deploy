# =============================================================================
# ingress.yaml (AWS)
# =============================================================================
# Uses the AWS Load Balancer Controller to provision a real Application Load
# Balancer (ALB) in front of the cluster. This is THE genuinely cloud-specific
# Kubernetes file in this project - the annotations below are AWS-only and
# have no equivalent meaning on Azure or GCP, which is exactly why this
# refactor moved ingress.yaml into per-cloud folders instead of trying to
# force one shared file to work everywhere.
#
# PREREQUISITE: the AWS Load Balancer Controller must be installed on the
# EKS cluster (typically via Helm) for these annotations to have any effect.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orion-ingress
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orion-service
                port:
                  number: 80
