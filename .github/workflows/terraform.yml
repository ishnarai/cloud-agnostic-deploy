# =============================================================================
# terraform.yml - REUSABLE workflow
# =============================================================================
# Provisions infrastructure for ONE selected cloud. Which cloud is decided
# entirely by the `cloud_provider` input passed in by the caller (cd.yml).

name: Terraform Provision

on:
  workflow_call:
    inputs:
      cloud_provider:
        description: "Which cloud to provision infrastructure for (aws, azure, gcp)"
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AZURE_CREDENTIALS:
        required: false
      GCP_SA_KEY:
        required: false
      GCP_PROJECT_ID:
        required: false

jobs:
  validate-input:
    name: Validate Cloud Provider
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate cloud provider
        run: |
          chmod +x scripts/validate-cloud-provider.sh
          bash scripts/validate-cloud-provider.sh "${{ inputs.cloud_provider }}"

  terraform:
    name: Provision Infrastructure
    needs: validate-input
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/${{ inputs.cloud_provider }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      ####################################################################
      # Cloud Authentication (Skipped in Demo Mode)
      ####################################################################

      - name: Configure AWS credentials
        if: inputs.cloud_provider == 'aws' && vars.DEMO_MODE != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Log in to Azure
        if: inputs.cloud_provider == 'azure' && vars.DEMO_MODE != 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate to Google Cloud
        if: inputs.cloud_provider == 'gcp' && vars.DEMO_MODE != 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      ####################################################################
      # Demo Mode
      ####################################################################

      - name: Simulate Terraform Provisioning
        if: vars.DEMO_MODE == 'true'
        run: |
          echo "========================================"
          echo "          DEMO MODE ENABLED"
          echo "========================================"
          echo ""
          echo "Selected Cloud : ${{ inputs.cloud_provider }}"
          echo ""
          echo "Running Terraform Init..."
          sleep 2
          echo "Terraform Init Complete"
          echo ""
          echo "Running Terraform Plan..."
          sleep 2
          echo "Terraform Plan Complete"
          echo ""
          echo "Running Terraform Apply..."
          sleep 2
          echo "Infrastructure Provisioned Successfully"
          echo ""
          echo "========================================"

      ####################################################################
      # Real Terraform Execution
      ####################################################################

      - name: Terraform Init
        if: vars.DEMO_MODE != 'true'
        run: terraform init

      - name: Terraform Apply
        if: vars.DEMO_MODE != 'true'
        run: |
          if [ "${{ inputs.cloud_provider }}" = "gcp" ]; then
            terraform apply -auto-approve -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}"
          else
            terraform apply -auto-approve
          fi

      ####################################################################
      # Finish
      ####################################################################

      - name: Infrastructure Ready
        run: |
          echo "Infrastructure stage completed successfully."
