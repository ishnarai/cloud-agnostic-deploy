# =============================================================================
# cd.yml - ORCHESTRATOR workflow
# =============================================================================
# This is the only workflow that is triggered directly.
# It determines the deployment inputs, then calls the reusable
# Terraform and Deploy workflows in sequence.

name: CD

on:
  push:
    branches:
      - main

  repository_dispatch:
    types:
      - app-image-built

  workflow_dispatch:
    inputs:
      cloud_provider:
        description: "Target cloud provider"
        required: true
        default: aws
        type: choice
        options:
          - aws
          - azure
          - gcp

      image_tag:
        description: "Docker image tag to deploy"
        required: true
        default: latest
        type: string

jobs:
  determine-inputs:
    name: Resolve deployment inputs
    runs-on: ubuntu-latest

    outputs:
      cloud_provider: ${{ steps.resolve.outputs.cloud_provider }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}

    steps:
      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "cloud_provider=aws" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.event.client_payload.image_tag }}" >> "$GITHUB_OUTPUT"

          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "cloud_provider=${{ inputs.cloud_provider }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

          else
            # Push event defaults
            echo "cloud_provider=aws" >> "$GITHUB_OUTPUT"
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
          fi

  terraform:
    name: Provision Infrastructure
    needs: determine-inputs

    uses: ./.github/workflows/terraform.yml

    with:
      cloud_provider: ${{ needs.determine-inputs.outputs.cloud_provider }}

    secrets: inherit

  deploy:
    name: Deploy Application

    needs:
      - determine-inputs
      - terraform

    uses: ./.github/workflows/deploy.yml

    with:
      cloud_provider: ${{ needs.determine-inputs.outputs.cloud_provider }}
      image_tag: ${{ needs.determine-inputs.outputs.image_tag }}

    secrets: inherit