# =============================================================================
# cd.yml - ORCHESTRATOR WORKFLOW
# =============================================================================
# Manual Continuous Deployment workflow.
#
# CI builds and pushes the Docker image.
#
# The user manually selects:
#   • Cloud Provider
#   • Docker Image
#
# This workflow then:
#   1. Validates the selected cloud
#   2. Provisions infrastructure (Terraform)
#   3. Deploys the selected Docker image
# =============================================================================

name: CD

on:

  workflow_dispatch:

    inputs:

      cloud_provider:
        description: "Select Target Cloud Provider"
        required: true
        type: choice
        default: aws

        options:
          - aws
          - azure
          - gcp

      image_tag:
        description: "Full Docker Image (Paste from CI output)"
        required: true
        type: string

jobs:

  deployment-summary:

    name: Deployment Configuration

    runs-on: ubuntu-latest

    outputs:
      cloud_provider: ${{ steps.summary.outputs.cloud_provider }}
      image_tag: ${{ steps.summary.outputs.image_tag }}

    steps:

      - name: Display Deployment Configuration

        id: summary

        shell: bash

        run: |

          echo "cloud_provider=${{ inputs.cloud_provider }}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "==============================================="
          echo "      CLOUD AGNOSTIC DEPLOYMENT"
          echo "==============================================="
          echo ""

          echo "Selected Cloud"
          echo "${{ inputs.cloud_provider }}"
          echo ""

          echo "Docker Image"
          echo "${{ inputs.image_tag }}"
          echo ""

          echo "Terraform"
          echo "Provision Infrastructure"
          echo ""

          echo "Deployment"
          echo "Kubernetes"
          echo ""

          echo "==============================================="

  terraform:

    name: Provision Infrastructure

    needs: deployment-summary

    uses: ./.github/workflows/terraform.yml

    with:

      cloud_provider: ${{ needs.deployment-summary.outputs.cloud_provider }}

    secrets: inherit

  deploy:

    name: Deploy Application

    needs:

      - deployment-summary
      - terraform

    uses: ./.github/workflows/deploy.yml

    with:

      cloud_provider: ${{ needs.deployment-summary.outputs.cloud_provider }}

      image_tag: ${{ needs.deployment-summary.outputs.image_tag }}

    secrets: inherit

  completion:

    name: Deployment Complete

    needs:

      - deploy

    runs-on: ubuntu-latest

    steps:

      - name: Deployment Summary

        run: |

          echo ""
          echo "==============================================="
          echo "      DEPLOYMENT FINISHED"
          echo "==============================================="
          echo ""

          echo "Cloud Provider"
          echo "${{ inputs.cloud_provider }}"
          echo ""

          echo "Docker Image"
          echo "${{ inputs.image_tag }}"
          echo ""

          echo "Status"
          echo "Deployment completed successfully."
          echo ""

          echo "==============================================="