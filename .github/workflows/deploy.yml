# =============================================================================
# deploy.yml - REUSABLE DEPLOYMENT WORKFLOW
# =============================================================================

name: Deploy to Kubernetes

on:

  workflow_call:

    inputs:

      cloud_provider:
        required: true
        type: string

      image_tag:
        required: true
        type: string

    secrets:

      AWS_ACCESS_KEY_ID:
        required: false

      AWS_SECRET_ACCESS_KEY:
        required: false

      AZURE_CREDENTIALS:
        required: false

      GCP_SA_KEY:
        required: false

      GCP_PROJECT_ID:
        required: false

jobs:

  deploy:

    name: Deploy Application

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Display Deployment Information

        run: |

          echo "======================================="

          echo "Cloud Provider : ${{ inputs.cloud_provider }}"

          echo "Image Tag      : ${{ inputs.image_tag }}"

          echo "======================================="

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

#############################################################
# DEMO MODE
#############################################################

      - name: Demo Deployment

        if: vars.DEMO_MODE == 'true'

        run: |

          echo ""

          echo "Running in DEMO MODE"

          echo ""

          echo "Cloud Provider"

          echo "${{ inputs.cloud_provider }}"

          echo ""

          echo "Docker Image"

          echo "${{ inputs.image_tag }}"

          echo ""

          echo "Provisioning Infrastructure..."

          sleep 2

          echo "Infrastructure Ready"

          sleep 2

          echo ""

          echo "Rendering Kubernetes Manifests"

          sleep 2

          echo ""

          echo "Applying deployment.yaml"

          sleep 2

          echo "Applying service.yaml"

          sleep 2

          echo "Applying ingress.yaml"

          sleep 2

          echo ""

          echo "Deployment Successful"

#############################################################
# REAL DEPLOYMENT
#############################################################

      - name: Make Scripts Executable

        if: vars.DEMO_MODE != 'true'

        run: chmod +x kubernetes/**/*.sh

      - name: Deploy to AWS

        if: inputs.cloud_provider == 'aws' && vars.DEMO_MODE != 'true'

        run: |

          ./kubernetes/aws/deploy.sh "${{ inputs.image_tag }}"

      - name: Deploy to Azure

        if: inputs.cloud_provider == 'azure' && vars.DEMO_MODE != 'true'

        run: |

          ./kubernetes/azure/deploy.sh "${{ inputs.image_tag }}"

      - name: Deploy to GCP

        if: inputs.cloud_provider == 'gcp' && vars.DEMO_MODE != 'true'

        run: |

          ./kubernetes/gcp/deploy.sh \
          "${{ inputs.image_tag }}" \
          "${{ secrets.GCP_PROJECT_ID }}"

      - name: Deployment Summary

        run: |

          echo ""

          echo "======================================="

          echo "Deployment Completed Successfully"

          echo ""

          echo "Cloud Provider"

          echo "${{ inputs.cloud_provider }}"

          echo ""

          echo "Docker Image"

          echo "${{ inputs.image_tag }}"

          echo ""

          echo "======================================="