# =============================================================================
# deploy.yml - REUSABLE workflow
# =============================================================================
# Applies Kubernetes manifests and deploys the specified image to the
# specified cloud's cluster. When DEMO_MODE=true, the deployment is simulated
# to demonstrate the cloud-agnostic CI/CD pipeline without requiring actual
# cloud credentials or infrastructure.

name: Deploy to Kubernetes

on:
  workflow_call:
    inputs:
      cloud_provider:
        required: true
        type: string

      image_tag:
        required: true
        type: string

    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AZURE_CREDENTIALS:
        required: false
      GCP_SA_KEY:
        required: false
      GCP_PROJECT_ID:
        required: false

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      ####################################################################
      # Cloud Authentication (Skipped in Demo Mode)
      ####################################################################

      - name: Configure AWS credentials
        if: inputs.cloud_provider == 'aws' && vars.DEMO_MODE != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Log in to Azure
        if: inputs.cloud_provider == 'azure' && vars.DEMO_MODE != 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate to Google Cloud
        if: inputs.cloud_provider == 'gcp' && vars.DEMO_MODE != 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: inputs.cloud_provider == 'gcp' && vars.DEMO_MODE != 'true'
        uses: google-github-actions/setup-gcloud@v2

      ####################################################################
      # Demo Deployment
      ####################################################################

      - name: Simulate Kubernetes Deployment
        if: vars.DEMO_MODE == 'true'
        run: |
          echo "========================================"
          echo "          DEMO MODE ENABLED"
          echo "========================================"
          echo ""
          echo "Target Cloud : ${{ inputs.cloud_provider }}"
          echo "Container Image : ${{ inputs.image_tag }}"
          echo ""
          echo "Connecting to Kubernetes cluster..."
          sleep 2
          echo "Cluster connection established."
          echo ""
          echo "Applying deployment.yaml..."
          sleep 2
          echo "Deployment applied."
          echo ""
          echo "Applying service.yaml..."
          sleep 2
          echo "Service created."
          echo ""
          echo "Applying ingress.yaml..."
          sleep 2
          echo "Ingress configured."
          echo ""
          echo "Waiting for application rollout..."
          sleep 2
          echo ""
          echo "Application deployed successfully."
          echo ""
          echo "========================================"

      ####################################################################
      # Real Deployment
      ####################################################################

      - name: Make deployment scripts executable
        if: vars.DEMO_MODE != 'true'
        run: chmod +x kubernetes/**/*.sh

      - name: Run deploy script (AWS)
        if: inputs.cloud_provider == 'aws' && vars.DEMO_MODE != 'true'
        run: ./kubernetes/aws/deploy.sh "${{ inputs.image_tag }}"

      - name: Run deploy script (Azure)
        if: inputs.cloud_provider == 'azure' && vars.DEMO_MODE != 'true'
        run: ./kubernetes/azure/deploy.sh "${{ inputs.image_tag }}"

      - name: Run deploy script (GCP)
        if: inputs.cloud_provider == 'gcp' && vars.DEMO_MODE != 'true'
        run: ./kubernetes/gcp/deploy.sh "${{ inputs.image_tag }}" "${{ secrets.GCP_PROJECT_ID }}"

      ####################################################################
      # Finish
      ####################################################################

      - name: Deployment Complete
        run: |
          echo "Deployment stage completed successfully."
