# =============================================================================
# deployment.yaml (AWS)
# =============================================================================
# Kubernetes Deployment Manifest
#
# IMAGE_PLACEHOLDER is replaced during deployment by deploy.sh.
# Example:
# ishnarai/cloud-agnostic-app:cloud-agnostic-20260716.001
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: orion-deployment
  labels:
    app: orion

spec:
  replicas: 2

  selector:
    matchLabels:
      app: orion

  template:

    metadata:
      labels:
        app: orion

    spec:

      containers:

        - name: orion-app

          image: IMAGE_PLACEHOLDER

          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:

            - name: CLOUD_PROVIDER
              value: "aws"

          resources:

            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20