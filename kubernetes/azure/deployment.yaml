# =============================================================================
# deployment.yaml (AZURE)
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: orion-deployment

  labels:
    app: orion

spec:

  replicas: 2

  selector:
    matchLabels:
      app: orion

  template:

    metadata:
      labels:
        app: orion

    spec:

      containers:

        - name: orion-app

          image: IMAGE_PLACEHOLDER

          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:

            - name: CLOUD_PROVIDER
              value: "azure"

          resources:

            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20